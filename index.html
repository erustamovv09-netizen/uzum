<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Mouse Cutout Text</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030303;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .input-box {
            position: absolute;
            bottom: 40px;
            z-index: 2;
        }
        input {
            background: rgba(5, 5, 5, 0.6);
            border: 1px solid #10b981;
            border-radius: 25px;
            color: #ffffff;
            padding: 12px 35px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            width: 250px;
            transition: all 0.3s ease;
        }
        input:focus {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            background: rgba(0, 0, 0, 0.9);
        }
        input::placeholder {
            color: #888;
        }
    </style>
</head>
<body>

    <div class="input-box">
        <input type="text" id="textInput" placeholder="SÖZ YAZ VƏ ENTER BAS" autocomplete="off">
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030303, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 250;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        const PARTICLE_COUNT = 30000;
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        
        const galaxyTargets = new Float32Array(PARTICLE_COUNT * 3);
        const textTargets = new Float32Array(PARTICLE_COUNT * 3);
        const galaxyColors = new Float32Array(PARTICLE_COUNT * 3);
        
        const colorPalette = [
            new THREE.Color('#ffffff'), new THREE.Color('#ffffff'), 
            new THREE.Color('#ffcc77'), new THREE.Color('#aaccff'), new THREE.Color('#ffbbee')
        ];

        const ARMS = 5;
        const MAX_RADIUS = 180;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const p = Math.pow(Math.random(), 2);
            const radius = p * MAX_RADIUS;
            const branch = i % ARMS;
            const angle = (branch * ((Math.PI * 2) / ARMS)) + (radius * 0.05);
            const scatter = (Math.random() - 0.5) * (radius * 0.25 + 5);
            
            const x = Math.cos(angle) * radius + scatter;
            const y = (Math.random() - 0.5) * (radius * 0.15);
            const z = Math.sin(angle) * radius + (Math.random() - 0.5) * (radius * 0.25);

            const idx = i * 3;
            galaxyTargets[idx] = x;
            galaxyTargets[idx + 1] = y;
            galaxyTargets[idx + 2] = z;

            positions[idx] = x;
            positions[idx + 1] = y;
            positions[idx + 2] = z;

            const mixedColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            galaxyColors[idx] = mixedColor.r;
            galaxyColors[idx + 1] = mixedColor.g;
            galaxyColors[idx + 2] = mixedColor.b;
            
            colors[idx] = mixedColor.r;
            colors[idx + 1] = mixedColor.g;
            colors[idx + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 2.2, // Yozuv qalin bo'lishi uchun
            map: createParticleTexture(),
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        const group = new THREE.Group();
        group.add(particles);
        scene.add(group);

        let isTextMode = false;

        function updateText(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000;
            canvas.height = 500;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '900 180px "Arial Black", Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const points = [];

            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x += 2) {
                    if (data[(y * canvas.width + x) * 4] > 128) {
                        points.push({ 
                            x: (x - canvas.width / 2) * 0.4, 
                            y: -(y - canvas.height / 2) * 0.4 
                        });
                    }
                }
            }

            if (points.length > 0) {
                points.sort(() => Math.random() - 0.5);
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const pt = points[i % points.length];
                    const idx = i * 3;
                    textTargets[idx] = pt.x;
                    textTargets[idx + 1] = pt.y;
                    textTargets[idx + 2] = 0; 
                }
            }
        }

        const input = document.getElementById('textInput');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const text = e.target.value.trim().toUpperCase();
                if (text === '') {
                    isTextMode = false;
                } else {
                    updateText(text);
                    isTextMode = true;
                }
            }
        });

        let mouseX = -9999;
        let mouseY = -9999;
        let scale = 1;

        // Sichqoncha koordinatalarini 3D makonga mukammal moslashtirish
        function updateScale() {
            const fov = 60 * Math.PI / 180;
            const visibleHeight = 2 * Math.tan(fov / 2) * 250;
            scale = visibleHeight / window.innerHeight;
        }
        updateScale();

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * scale;
            mouseY = -(e.clientY - window.innerHeight / 2) * scale;
        });
        window.addEventListener('mouseleave', () => {
            mouseX = -9999; mouseY = -9999;
        });

        let time = 0;
        let morphValue = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.002;

            morphValue += ((isTextMode ? 1 : 0) - morphValue) * 0.05;

            group.rotation.x = (1 - morphValue) * 1.2; 
            group.rotation.z = (1 - morphValue) * time * 0.5; 
            group.rotation.y = (1 - morphValue) * -0.2; 

            const pos = geometry.attributes.position.array;
            const col = geometry.attributes.color.array;

            const mouseRadius = 35; // Sichqoncha kesib o'tadigan dumaloqning kattaligi

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const idx = i * 3;
                
                let tx = galaxyTargets[idx] * (1 - morphValue) + textTargets[idx] * morphValue;
                let ty = galaxyTargets[idx + 1] * (1 - morphValue) + textTargets[idx + 1] * morphValue;
                let tz = galaxyTargets[idx + 2] * (1 - morphValue) + textTargets[idx + 2] * morphValue;

                // YANGI FIZIKA: Sichqoncha yurganda xuddi suvdek yoki lazerdek kesish effekti
                if (morphValue > 0.8 && mouseX !== -9999) {
                    // Zarrachadan sichqonchagacha bo'lgan masofa
                    let dx = pos[idx] - mouseX;
                    let dy = pos[idx + 1] - mouseY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < mouseRadius) {
                        // Agar zarracha sichqoncha radiusiga kirib qolsa, uni aniq radius chegarasiga surib qo'yadi
                        let angle = Math.atan2(dy, dx);
                        tx = mouseX + Math.cos(angle) * mouseRadius;
                        ty = mouseY + Math.sin(angle) * mouseRadius;
                    }
                }

                // Silliq harakatlanish
                pos[idx] += (tx - pos[idx]) * 0.15;
                pos[idx + 1] += (ty - pos[idx + 1]) * 0.15;
                pos[idx + 2] += (tz - pos[idx + 2]) * 0.15;

                col[idx] = galaxyColors[idx] * (1 - morphValue) + 1.0 * morphValue;
                col[idx + 1] = galaxyColors[idx + 1] * (1 - morphValue) + 1.0 * morphValue;
                col[idx + 2] = galaxyColors[idx + 2] * (1 - morphValue) + 1.0 * morphValue;
            }

            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateScale();
        });
    </script>
</body>
</html>
